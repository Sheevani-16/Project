spring.application.name=user-service
server.port=8081

spring.datasource.url=jdbc:postgresql://project_db:5432/user
spring.datasource.username=postgres
spring.datasource.password=root
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.cloud.consul.host=project_consul
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s

# Force registration with IP instead of Hostname
spring.cloud.consul.discovery.prefer-ip-address=true

# (Optional but recommended) explicitly ignore the mshome.net domain
spring.cloud.inetutils.ignored-interfaces=mshome.*


management.endpoints.web.exposure.include=health,info
