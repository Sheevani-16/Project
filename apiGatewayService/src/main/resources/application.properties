spring.application.name=apiGatewayService

# Server Settings
server.port=8080

# --- Consul Discovery Configuration ---
spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
# Important: Unique instance ID for Consul
spring.cloud.consul.discovery.instance-id=${spring.application.name}:${random.value}
# Path used by Consul to check if this service is healthy
spring.cloud.consul.discovery.health-check-path=/actuator/health
spring.cloud.consul.discovery.health-check-interval=10s
# Use IP instead of hostname (recommended for local/docker dev)
spring.cloud.consul.discovery.prefer-ip-address=true
# Force registration with IP instead of Hostname
# (Optional but recommended) explicitly ignore the mshome.net domain
spring.cloud.inetutils.ignored-interfaces=mshome.*

# --- API Gateway Routes ---
# Route 1: Example for a School service
spring.cloud.gateway.routes[0].id=user-service
# 'lb://' tells the gateway to load balance via Consul using the service name
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**
# Optional: Strip the prefix if the target service doesn't expect '/api'

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://notification-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/notifications/**

# --- Actuator Monitoring ---
# Enable the health endpoint so Consul can monitor the Gateway
management.endpoints.web.exposure.include=health,info,gateway
management.endpoint.health.show-details=always